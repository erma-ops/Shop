<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Магазин</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f6f6f6; }
    header { background:#111; color:#fff; padding:16px; text-align:center; }
    .container { max-width:1100px; margin:20px auto; padding:0 12px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap:16px; }
    .card { background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow:hidden; }
    .card img { width:100%; height:180px; object-fit:cover; }
    .card .info { padding:12px; }
    .title { font-size:16px; margin:0 0 8px; }
    .price { font-weight:bold; color:#0a7; }
    footer { text-align:center; color:#666; padding:16px; }
  </style>
</head>
<body>
  <header>
    <h1>Каталог товаров</h1>
  </header>

  <div class="container">
    <div class="grid">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?q=80&w=800" alt="Товар 1">
        <div class="info">
          <p class="title">Товар 1</p>
          <p class="price">1 500 KGS</p>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1512499617640-c2f999098c01?q=80&w=800" alt="Товар 2">
        <div class="info">
          <p class="title">Товар 2</p>
          <p class="price">2 300 KGS</p>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1503602642458-232111445657?q=80&w=800" alt="Товар 3">
        <div class="info">
          <p class="title">Товар 3</p>
          <p class="price">980 KGS</p>
        </div>
      </div>
    </div>
  </div>

  <footer>
    © Магазин · Цены в KGS
  </footer>
</body>
</html>
